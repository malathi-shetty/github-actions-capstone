name: Scheduled Health Check

on:

  # Run every 12 hours
  schedule:
    - cron: '0 */12 * * *'

  # Manual trigger
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone:latest
  CONTAINER_NAME: day48-health-probe

jobs:

  health-check:

    name: Docker Container Health Check

    runs-on: ubuntu-latest

    steps:

      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Pull latest Docker image
      - name: Pull latest image
        run: |
          echo "Pulling: $IMAGE_NAME"
          docker pull "$IMAGE_NAME"
          echo "Image pulled successfully"

      # Run container in detached mode
      - name: Start container
        run: |
          docker run -d \
            --name $CONTAINER_NAME \
            -p 3000:3000 \
            $IMAGE_NAME

          echo "Container started"

      # Wait for app startup
      - name: Wait for container startup
        run: |
          echo "Waiting for app to start..."

          for i in $(seq 1 10); do

            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is ready (attempt $i)"
              break
            fi

            echo "Attempt $i: app not ready yet — waiting 5s"
            sleep 5
          done

      # Health check
      - name: Check health endpoint
        id: health
        run: |

          RESPONSE=$(curl -s --max-time 10 http://localhost:3000/health)

          HTTP_CODE=$(curl -s -o /dev/null \
            -w "%{http_code}" \
            --max-time 10 \
            http://localhost:3000/health)

          echo "HTTP status: $HTTP_CODE"

          echo "Response:"
          echo "$RESPONSE"

          if echo "$RESPONSE" | grep -q '"status":"ok"'; then

            echo "STATUS=PASSED" >> "$GITHUB_ENV"

            echo "✅ Health check PASSED"

          else

            echo "STATUS=FAILED" >> "$GITHUB_ENV"

            echo "❌ Health check FAILED"

            exit 1
          fi

      # Stop and remove container
      - name: Cleanup container
        if: always()
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true

          echo "Container cleaned up"

      # Workflow summary
      - name: Health Check Summary
        if: always()
        run: |

          echo "## Health Check Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Image | \`$IMAGE_NAME\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Status | \`$STATUS\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Time | \`$(date -u)\` |" >> "$GITHUB_STEP_SUMMARY"
