name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/day48-capstone-app

jobs:

  # Job 1 — Build and test
  build-test:

    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true

  # Job 2 — Docker build and push
  docker:

    name: Docker Build & Push

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone
      tag: latest
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # Job 3 — Deploy
  deploy:

    name: Deploy to Production

    needs: docker

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Deploy application
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }} to production"
          echo ""
          echo "Deployment steps:"
          echo "  1. Pull ${{ needs.docker.outputs.image_url }}"
          echo "  2. Stop existing container"
          echo "  3. Start new container with updated image"
          echo "  4. Run healthcheck"
          echo ""
          echo "✅ Deployment to production complete"

      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Environment | production |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Docker Image | \`${{ needs.docker.outputs.image_url }}\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Build & Test | ✅ ${{ needs.build-test.outputs.test_result }} |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Commit | \`$(echo "${{ github.sha }}" | cut -c1-7)\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Status | ✅ Deploy simulated |" >> "$GITHUB_STEP_SUMMARY"
