name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


  docker:
    uses: ./.github/workflows/reusable-docker.yml
    needs: build-test
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  update-readme:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Smart DevSecOps Report
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "## 🚀 DevSecOps Release Intelligence" > release.md
          echo "" >> release.md

          echo "### 🧠 AI Summary" >> release.md
          echo "- Pipeline executed successfully" >> release.md
          echo "- Build + Test completed" >> release.md
          echo "- Docker image built & scanned" >> release.md

          echo "" >> release.md
          echo "### 🐳 Docker Image" >> release.md
          echo "- Image: ${{ needs.docker.outputs.image_url }}" >> release.md
          echo "- Digest: ${{ needs.docker.outputs.image_digest }}" >> release.md

          echo "" >> release.md
          echo "### 🔐 Security (Trivy)" >> release.md
          echo "- Status: CRITICAL/HIGH blocked" >> release.md
          echo "- Report: uploaded as artifact" >> release.md

          echo "" >> release.md
          echo "### 🧱 Architecture Flow" >> release.md
          echo '```text' >> release.md
          echo "GitHub Push → Build → Test → Docker → Trivy Scan → Deploy → Tag → README Update" >> release.md
          echo '```' >> release.md

          echo "" >> release.md
          echo "### 📊 Pipeline Graph" >> release.md
          echo "GitHub Actions Workflow → jobs: build → docker → scan → deploy → docs" >> release.md

          echo "" >> release.md
          echo "### 🧾 Commit Info" >> release.md
          echo "- Commit: $SHORT_SHA" >> release.md
          echo "- Run: $GITHUB_RUN_NUMBER" >> release.md

          echo "" >> release.md
          echo "🚀 System Status: Production Ready"

      - name: Replace README Section ONLY
        run: |
          awk '
          /<!-- CI-REPORT-START -->/ {
            print
            system("cat release.md")
            skip=1
            next
          }
          /<!-- CI-REPORT-END -->/ {
            skip=0
            print
            next
          }
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: smart DevSecOps update" || echo "no changes"
          git push
