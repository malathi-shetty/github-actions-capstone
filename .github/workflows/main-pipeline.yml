name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


# =========================================================
# PIPELINE FLOW (VISUAL IN CODE)
# =========================================================
# build-test
#   ↓
# docker
#   ↓
# trivy-scan
#   ├── trivy-json   → automation + security-gate
#   ├── trivy-sarif  → GitHub Security tab
#   ↓
# generate-reports
#   ├── trivy.md
#   ├── ai.md
#   ↓
# security-gate
#   ↓
# deploy
# =========================================================


jobs:


# =========================================================
# STAGE 1: BUILD + TEST
# =========================================================
# FLOW:
# source code → tests → validated build
# =========================================================

  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# STAGE 2: DOCKER BUILD
# =========================================================
# FLOW:
# build output → docker image → push registry
# =========================================================

  docker:
    name: Docker Build

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# STAGE 3: TRIVY SECURITY SCAN
# =========================================================
# FLOW:
# docker image → vulnerability scan
#
# OUTPUT ARTIFACTS:
#   ├── trivy-json  → used for security-gate
#   ├── trivy-sarif → GitHub Security tab
# =========================================================

  trivy-scan:
    name: Run Trivy Scan

    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq trivy

      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# =========================================================
# STAGE 4: REPORT GENERATION
# =========================================================
# FLOW:
# trivy.json → markdown report → AI summary
# =========================================================

  generate-reports:
    name: Generate Reports

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Generate Reports
        run: |
          echo "## Trivy Report" > trivy.md
          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## AI Notes" > ai.md
          echo "- Scan completed" >> ai.md

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# STAGE 5: SECURITY GATE
# =========================================================
# FLOW:
# trivy.json → check HIGH/CRITICAL → PASS/FAIL
# =========================================================

  security-gate:
    name: Security Gate

    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate Vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "BLOCKED: Security issues found"
            exit 1
          fi


# =========================================================
# STAGE 6: DEPLOYMENT
# =========================================================
# FLOW:
# approved image → deploy → live app
# =========================================================

  deploy:
    name: Deploy

    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"
