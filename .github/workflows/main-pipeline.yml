name: Main Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# FLOW
# build-test → docker → trivy-scan → reports → dashboard → gate → deploy
# =========================================================

jobs:

  # =========================================================
  # 1. BUILD & TEST
  # =========================================================
  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


  # =========================================================
  # 2. DOCKER BUILD
  # =========================================================
  docker:
    name: Docker Build

    # Skip Docker push for Dependabot
    if: |
      github.actor != 'dependabot[bot]' &&
      secrets.DOCKER_USERNAME != '' &&
      secrets.DOCKER_TOKEN != ''

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  # =========================================================
  # 3. TRIVY SCAN
  # =========================================================
  trivy-scan:
    name: Trivy Scan

    if: needs.docker.result == 'success'

    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      # Checkout
      - name: Checkout code
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5

      # Install tools
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      # Cache Trivy DB
      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae

        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

          restore-keys: |
            trivy-db-${{ runner.os }}-

      # JSON Scan
      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # SARIF Scan
      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # Upload JSON Artifact
      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4

        with:
          name: trivy-json
          path: trivy.json

      # Upload SARIF Artifact
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4

        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # Upload SARIF to Security Tab
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

      # PR annotations
      - name: SARIF PR Annotations
        if: github.event_name == 'pull_request'

        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

      # SARIF Gate
      - name: SARIF Security Gate
        run: |
          COUNT=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-results.sarif)

          echo "SARIF Issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ BLOCKED by SARIF Gate"
            exit 1
          fi


  # =========================================================
  # 4. REPORTS
  # =========================================================
  generate-reports:
    name: Generate Reports

    if: needs.trivy-scan.result == 'success'

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download Trivy JSON
        uses: actions/download-artifact@v4

        with:
          name: trivy-json

      - name: Build Reports
        run: |
          echo "## 📦 Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## 🤖 AI Summary" > ai.md
          echo "- Scan completed successfully" >> ai.md

      - name: Upload Reports
        uses: actions/upload-artifact@v4

        with:
          name: reports

          path: |
            trivy.md
            ai.md


  # =========================================================
  # 5. SECURITY DASHBOARD
  # =========================================================
  security-dashboard:
    name: Security Dashboard

    if: needs.trivy-scan.result == 'success'

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download Trivy JSON
        uses: actions/download-artifact@v4

        with:
          name: trivy-json

      - name: JSON Scan Summary
        run: |
          echo "## 📦 JSON Scan Summary" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "- Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY

      - name: Top Vulnerable Packages
        run: |
          echo "## 📦 Top Vulnerable Packages" >> $GITHUB_STEP_SUMMARY

          jq -r '.Results[].Vulnerabilities[]? | .PkgName' trivy.json \
          | sort | uniq -c | sort -nr | head -10 \
          | while read count pkg; do
              echo "- $pkg → $count issues" >> $GITHUB_STEP_SUMMARY
            done

      - name: Image Info
        run: |
          echo "## 🐳 Image Info" >> $GITHUB_STEP_SUMMARY
          echo "- Image: shettymalathi113/github-actions-capstone" >> $GITHUB_STEP_SUMMARY
          echo "- Build: v1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Security Verdict
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)

          if [ "$CRITICAL" -gt 0 ]; then
            echo "## 🚨 SECURITY STATUS: BLOCKED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ SECURITY STATUS: CLEAN" >> $GITHUB_STEP_SUMMARY
          fi


  # =========================================================
  # 6. SECURITY GATE
  # =========================================================
  security-gate:
    name: Security Gate

    if: needs.trivy-scan.result == 'success'

    needs:
      - trivy-scan
      - generate-reports
      - security-dashboard

    runs-on: ubuntu-latest

    steps:

      - name: Download Trivy JSON
        uses: actions/download-artifact@v4

        with:
          name: trivy-json

      - name: Final Evaluation
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi


  # =========================================================
  # 7. DEPLOY
  # =========================================================
  deploy:
    name: Deploy

    if: |
      needs.security-gate.result == 'success' &&
      github.actor != 'dependabot[bot]'

    needs: security-gate
    runs-on: ubuntu-latest

    steps:

      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
