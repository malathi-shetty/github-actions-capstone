name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE v1.0.${{ github.run_number }}-${{ github.sha }}"
          echo "Success"

  ai-trivy:
    name: AI + Trivy Report
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────
      # INSTALL TRIVY (FIXED - NO DOWNLOAD ISSUES)
      # ─────────────────────────────
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.48.0/trivy_0.48.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.0_Linux-64bit.deb

      # ─────────────────────────────
      # RUN TRIVY
      # ─────────────────────────────
      - name: Run Trivy Scan
        run: |
          trivy image \
            --format json \
            --output trivy.json \
            ${{ needs.docker.outputs.image_url || 'shettymalathi113/github-actions-capstone:latest' }}

      # ─────────────────────────────
      # CREATE TRIVY TABLE
      # ─────────────────────────────
      - name: Generate Trivy Table
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy.md
          echo "" >> trivy.md
          echo "| Severity | Package | Vulnerability | Status |" >> trivy.md
          echo "|----------|---------|---------------|--------|" >> trivy.md

          if [ -f trivy.json ]; then
            jq -r '.Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.Status) |"' trivy.json >> trivy.md
          else
            echo "| No scan data yet | - | - | - |" >> trivy.md
          fi

      # ─────────────────────────────
      # AI NOTES
      # ─────────────────────────────
      - name: Generate AI Notes
        run: |
          echo "## 🤖 AI Release Notes" > ai.md
          echo "" >> ai.md
          echo "Auto-generated release notes for v1.0.${{ github.run_number }}" >> ai.md
          echo "- Build successful" >> ai.md
          echo "- Docker built" >> ai.md
          echo "- Trivy scan completed" >> ai.md

      # ─────────────────────────────
      # UPDATE README SAFELY
      # ─────────────────────────────
      - name: Update README
        run: |
          awk '
          /<!-- AI-START -->/ {print; system("cat ai.md"); skip=1; next}
          /<!-- AI-END -->/ {skip=0}
          /<!-- TRIVY-TABLE-START -->/ {print; system("cat trivy.md"); skip2=1; next}
          /<!-- TRIVY-TABLE-END -->/ {skip2=0}
          !skip && !skip2
          ' README.md > tmp && mv tmp README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update AI + Trivy" || exit 0
          git push origin HEAD:main
