name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  # ─────────────────────────────
  # 2. DOCKER (NO TRIVY HERE)
  # ─────────────────────────────
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────
  # 3. DEPLOY
  # ─────────────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "IMAGE: v1.0.${{ github.run_number }}-${{ github.sha }}"
          echo "Deploying..."
          echo "Health check passed"

  # ─────────────────────────────
  # 4. GITHUB PAGES
  # ─────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages Dashboard
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Generate Dashboard
        run: |
          cat <<EOF > docs/index.html
<!DOCTYPE html>
<html>
<head><title>DevSecOps Dashboard</title></head>
<body>

<h1>🚀 CI/CD Live Dashboard</h1>

<p><b>Image:</b> v1.0.${{ github.run_number }}-${{ github.sha }}</p>
<p><b>Version:</b> v1.0.${{ github.run_number }}</p>
<p><b>Commit:</b> ${{ github.sha }}</p>
<p><b>Time:</b> $(date -u)</p>

<h2>Pipeline Status</h2>
<ul>
<li>Build → Success</li>
<li>Docker → Success</li>
<li>Deploy → Success</li>
</ul>

</body>
</html>
EOF

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs

  # ─────────────────────────────
  # 5. VERSION TAGGING
  # ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${GITHUB_RUN_NUMBER}
          git push origin v1.0.${GITHUB_RUN_NUMBER}

  # ─────────────────────────────
  # 6. SAVE STATUS
  # ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=v1.0.${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt

  # ─────────────────────────────
  # 7. AI RELEASE NOTES + TRIVY (NOW IN MAIN)
  # ─────────────────────────────
  ai-release:
    name: AI + Trivy Reports
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ─────────────────────────────
      # AI RELEASE NOTES
      # ─────────────────────────────
      - name: Generate AI Release Notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -e

          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a DevSecOps release notes generator.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Generate release notes for CI/CD pipeline. Commit $SHORT_SHA Version v1.0.${GITHUB_RUN_NUMBER}\"
                }
              ]
            }")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$AI_TEXT" ]; then
            AI_TEXT="AI release notes unavailable"
          fi

          echo "## 🤖 AI Release Notes" > ai.md
          echo "" >> ai.md
          echo "$AI_TEXT" >> ai.md

      # ─────────────────────────────
      # TRIVY (NOW HERE - FIXED)
      # ─────────────────────────────
      - name: Run Trivy Scan
        run: |
          trivy image \
            --format json \
            --output trivy.json \
            --severity CRITICAL,HIGH \
            shettymalathi113/github-actions-capstone:v1.0.${GITHUB_RUN_NUMBER}-${GITHUB_SHA}

      - name: Generate Trivy Table
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy.md
          echo "" >> trivy.md
          echo "| Severity | Package | Vulnerability | Status |" >> trivy.md
          echo "|----------|---------|---------------|--------|" >> trivy.md

          if [ -f trivy.json ]; then
            jq -r '.Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.Status) |"' trivy.json >> trivy.md
          else
            echo "| No vulnerabilities found | - | - | - |" >> trivy.md
          fi

      # ─────────────────────────────
      # UPDATE README SAFELY
      # ─────────────────────────────
      - name: Update README
        run: |
          awk '
          /<!-- AI-START -->/ {print; system("cat ai.md"); skip=1; next}
          /<!-- AI-END -->/ {skip=0}
          /<!-- TRIVY-TABLE-START -->/ {print; system("cat trivy.md"); skip2=1; next}
          /<!-- TRIVY-TABLE-END -->/ {skip2=0}
          !skip && !skip2
          ' README.md > tmp && mv tmp README.md

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: update AI + Trivy report" || exit 0
          git pull --rebase origin main || true
          git push origin HEAD:main
