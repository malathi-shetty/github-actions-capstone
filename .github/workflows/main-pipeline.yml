name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  # ─────────────────────────────
  # Job 1 — Build & Test
  # ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  # ─────────────────────────────
  # Job 2 — Create Git Tag
  # ─────────────────────────────
  versioning:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $VERSION
          git push origin $VERSION

  # ─────────────────────────────
  # Job 3 — Docker Build & Push
  # ─────────────────────────────
  docker:
    name: Docker Build & Push
    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────
  # Job 4 — Deploy
  # ─────────────────────────────
  deploy:
    name: Deploy to Production
    needs: docker
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Deploy
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }}"
          echo "Pulling image..."
          echo "Starting container..."
          echo "Health check passed"
          echo "DONE"

      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Environment | production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`$IMAGE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build & Test | $RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`$(echo "${GITHUB_SHA}" | cut -c1-7)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | Deploy simulated |" >> "$GITHUB_STEP_SUMMARY"
