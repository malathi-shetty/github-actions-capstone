name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone

jobs:

  # ─────────────────────────────────────────────────────────────
  # Job 1 — Build and Test
  # ─────────────────────────────────────────────────────────────
  build-test:

    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


  # ─────────────────────────────────────────────────────────────
  # Job 2 — Docker Build & Push
  # Runs only if build-test succeeds
  # ─────────────────────────────────────────────────────────────
  docker:

    name: Docker Build & Push

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone
      tag: latest
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  # ─────────────────────────────────────────────────────────────
  # Job 3 — Deploy
  # Runs only if Docker build succeeds
  # ─────────────────────────────────────────────────────────────
  deploy:

    name: Deploy to Production

    needs:
      - build-test
      - docker

    runs-on: ubuntu-latest

    environment:
      name: production

    env:
      IMAGE_URL: ${{ needs.docker.outputs.image_url }}
      TEST_RESULT: ${{ needs.build-test.outputs.test_result }}
      SHORT_SHA: ${{ github.sha }}

    steps:

      # Simulated deployment
      - name: Deploy application
        run: |
          echo "Deploying image: $IMAGE_URL to production"
          echo ""
          echo "Deployment steps:"
          echo "  1. Pull image: $IMAGE_URL"
          echo "  2. Stop existing container"
          echo "  3. Start updated container"
          echo "  4. Run health checks"
          echo ""
          echo "✅ Deployment to production complete"

      # GitHub Actions summary
      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Environment | production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`$IMAGE_URL\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build & Test | ✅ $TEST_RESULT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`$(echo "$SHORT_SHA" | cut -c1-7)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ✅ Deploy simulated |" >> "$GITHUB_STEP_SUMMARY"
