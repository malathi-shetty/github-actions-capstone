name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


jobs:

# =========================================================
# STAGE 1: BUILD + TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# =========================================================
# STAGE 2: DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# STAGE 3: TRIVY SCAN (FULL VISIBILITY)
# =========================================================
  trivy-scan:
    name: Run Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Checkout pipeline context
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          echo "::group::Installing Security Tools"
          sudo apt-get update
          sudo apt-get install -y wget jq trivy
          echo "Trivy installed"
          echo "::endgroup::"

      - name: Run JSON Vulnerability Scan
        run: |
          echo "::group::TRIVY JSON SCAN"

          echo "Scanning image..."
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "JSON scan completed"
          ls -lh trivy.json
          echo "::endgroup::"

      - name: Run SARIF Scan
        run: |
          echo "::group::TRIVY SARIF SCAN"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "SARIF scan completed"
          ls -lh trivy.sarif
          echo "::endgroup::"

      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# =========================================================
# STAGE 4: REPORT GENERATION
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Generate Reports
        run: |
          echo "::group::REPORT GENERATION"

          echo "Building trivy.md..."
          echo "## Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "Generating AI summary..."
          echo "## AI Notes" > ai.md
          echo "- Scan completed successfully" >> ai.md

          ls -lh trivy.md ai.md
          echo "::endgroup::"

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# STAGE 5: SECURITY GATE
# =========================================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download Scan Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate Security Policy
        run: |
          echo "::group::SECURITY GATE"

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL: $CRITICAL"
          echo "HIGH: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi

          echo "✅ PASSED"
          echo "::endgroup::"


# =========================================================
# STAGE 6: DEPLOY
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:

      - name: Deploy Start
        run: |
          echo "======================================"
          echo "DEPLOYMENT STARTING"
          echo "======================================"

      - name: Deploy App
        run: |
          echo "::group::DEPLOYMENT"
          echo "Deploying v1.0.${{ github.run_number }}"
          echo "STATUS: LIVE"
          echo "::endgroup::"
