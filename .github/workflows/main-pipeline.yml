name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  # ─────────────────────────────
  # 2. DOCKER BUILD
  # ─────────────────────────────
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────
  # 3. TRIVY SCAN (FIXED - NO CLI)
  # ─────────────────────────────
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}-${{ github.sha }}
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Generate Trivy Table
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy.md
          echo "" >> trivy.md
          echo "| Severity | Package | Vulnerability | Status |" >> trivy.md
          echo "|----------|---------|---------------|--------|" >> trivy.md

          if [ -f trivy.json ]; then
            jq -r '.Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.Status) |"' trivy.json >> trivy.md
          else
            echo "| No scan data yet | - | - | - |" >> trivy.md
          fi

  # ─────────────────────────────
  # 4. DEPLOY
  # ─────────────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "IMAGE: v1.0.${{ github.run_number }}-${{ github.sha }}"
          echo "Deploying..."
          echo "Health check passed"

  # ─────────────────────────────
  # 5. VERSION TAGGING (FIXED)
  # ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          TAG="v1.0.${GITHUB_RUN_NUMBER}"

          git tag $TAG
          git push origin $TAG

  # ─────────────────────────────
  # 6. SAVE STATUS
  # ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=v1.0.${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt

  # ─────────────────────────────
  # 7. AI RELEASE NOTES (SAFE)
  # ─────────────────────────────
  ai-release:
    name: AI Release Notes
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate AI Notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a DevSecOps release notes generator.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"Commit $SHORT_SHA Version v1.0.${GITHUB_RUN_NUMBER}\"
                }
              ]
            }")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$AI_TEXT" ]; then
            AI_TEXT="AI release notes unavailable"
          fi

          echo "## 🤖 AI Release Notes" > ai.md
          echo "" >> ai.md
          echo "$AI_TEXT" >> ai.md

      - name: Update README
        run: |
          awk '
          /<!-- AI-START -->/ {print; system("cat ai.md"); skip=1; next}
          /<!-- AI-END -->/ {skip=0}
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update AI notes" || exit 0
          git pull --rebase origin main || true
          git push origin HEAD:main
