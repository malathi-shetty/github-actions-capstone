name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


# =========================================================
# PIPELINE FLOW (DOCUMENTATION VIEW)
# =========================================================
# build-test
#   ↓
#   ├── run tests
#   └── build app
#
# docker
#   ↓
#   ├── build docker image
#   └── push image to registry
#
# trivy-scan
#   ↓
#   ├── install trivy
#   ├── run vulnerability scan (JSON)
#   │       ├── output: trivy.json
#   │       └── upload: trivy-json artifact
#   │
#   ├── run vulnerability scan (SARIF)
#   │       ├── output: trivy.sarif
#   │       ├── upload: trivy-sarif artifact
#   │       └── upload: GitHub Security tab
#
# generate-reports
#   ↓
#   ├── download trivy-json artifact
#   ├── parse JSON → build trivy.md report
#   ├── generate AI summary (ai.md)
#   └── upload reports artifact
#
# security-gate
#   ↓
#   ├── download trivy-json artifact
#   ├── count HIGH vulnerabilities (jq)
#   ├── count CRITICAL vulnerabilities (jq)
#   └── if any found → FAIL pipeline
#
# deploy
#   ↓
#   ├── deploy docker image
#   └── application goes live
# =========================================================


jobs:

# =========================================================
# STAGE 1: BUILD + TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# STAGE 2: DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# STAGE 3: TRIVY SCAN
# =========================================================
  trivy-scan:
    name: Run Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Install Trivy
        run: |
          echo "::group::Install Trivy"
          sudo apt-get update
          sudo apt-get install -y jq trivy
          echo "::endgroup::"

      - name: Run JSON Scan
        run: |
          echo "::group::Trivy JSON Scan"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "Generated: trivy.json"
          echo "::endgroup::"

      - name: Run SARIF Scan
        run: |
          echo "::group::Trivy SARIF Scan"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "Generated: trivy.sarif"
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# =========================================================
# STAGE 4: REPORTS
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Build Reports
        run: |
          echo "::group::Report Generation"

          echo "Creating trivy.md..."
          echo "## Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "Creating AI summary..."
          echo "## AI Notes" > ai.md
          echo "- Scan completed" >> ai.md

          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# STAGE 5: SECURITY GATE
# =========================================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate
        run: |
          echo "::group::Security Gate"

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "BLOCKED"
            exit 1
          fi

          echo "::endgroup::"


# =========================================================
# STAGE 6: DEPLOY
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          echo "::group::Deploy Stage"
          echo "Deploying image v1.0.${{ github.run_number }}"
          echo "Application LIVE"
          echo "::endgroup::"
