name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

# ─────────────────────────────
# 1. BUILD & TEST
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. DOCKER BUILD + TRIVY SCAN
# ─────────────────────────────
  docker:
    name: Docker Build + Trivy Scan
    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. VERSION TAGGING
# ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $VERSION
          git push origin $VERSION


# ─────────────────────────────
# 4. DEPLOY (SIMULATED)
# ─────────────────────────────
  deploy:
    name: Deploy
    needs: [build-test, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying image..."
          echo "Pulling image..."
          echo "Running container..."
          echo "Health check passed"
          echo "DONE"


# ─────────────────────────────
# 5. SAVE DOCKER STATUS
# ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create status file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=sha-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


# ─────────────────────────────
# 6. AI OPS README UPDATE (SAFE + CLEAN)
# ─────────────────────────────
  update-readme:
    name: AI Ops Release Notes
    needs: [build-test, docker, versioning]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "## 🚀 Release Summary" > release.md
          echo "" >> release.md
          echo "- Build: ${{ needs.build-test.result }}" >> release.md
          echo "- Docker: Pushed successfully" >> release.md
          echo "- Image: ${{ needs.docker.outputs.image_url }}" >> release.md
          echo "- Version: v1.0.${GITHUB_RUN_NUMBER}" >> release.md
          echo "- Commit: $SHORT_SHA" >> release.md
          echo "" >> release.md
          echo "## 🔐 Security" >> release.md
          echo "- Trivy Scan: Enabled (CRITICAL/HIGH enforced)" >> release.md
          echo "" >> release.md
          echo "## 📦 Pipeline Flow" >> release.md
          echo "Build → Test → Docker → Security Scan → Tag → Deploy" >> release.md
          echo "" >> release.md
          echo "🚀 System is production ready" >> release.md

      - name: Update README
        run: |
          echo "" >> README.md
          echo "---" >> README.md
          cat release.md >> README.md

      - name: Commit README changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: auto update release notes" || echo "no changes"
          git push
