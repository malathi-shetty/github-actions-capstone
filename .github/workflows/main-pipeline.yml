name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:

  # ─────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  # ─────────────────────────────
  # 2. DOCKER BUILD ONLY
  # ─────────────────────────────
  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────
  # 3. TRIVY SCAN (FIXED HERE)
  # ─────────────────────────────
  trivy:
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.55.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.55.0_Linux-64bit.deb

      - name: Run Trivy Scan
        run: |
          IMAGE="shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}-${{ github.sha }}"

          trivy image \
            --severity CRITICAL,HIGH \
            --format table \
            $IMAGE

  # ─────────────────────────────
  # 4. DEPLOY
  # ─────────────────────────────
  deploy:
    needs: trivy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          echo "Deploying application..."
          echo "Success"

  # ─────────────────────────────
  # 5. PAGES DASHBOARD
  # ─────────────────────────────
  deploy-pages:
    needs: trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create docs
        run: mkdir -p docs

      - name: Generate Dashboard
        run: |
          echo "<h1>CI/CD Dashboard</h1>" > docs/index.html
          echo "<p>Build Success</p>" >> docs/index.html
          echo "<p>Docker Success</p>" >> docs/index.html
          echo "<p>Trivy Completed</p>" >> docs/index.html

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
