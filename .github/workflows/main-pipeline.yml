name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write   # required for tags + README update

jobs:

# ─────────────────────────────
# 1. BUILD & TEST
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. DOCKER BUILD & PUSH + TRIVY
# ─────────────────────────────
  docker:
    name: Docker Build + Trivy Scan
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: latest
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. VERSION TAGGING
# ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $VERSION
          git push origin $VERSION


# ─────────────────────────────
# 4. DEPLOY
# ─────────────────────────────
  deploy:
    name: Deploy
    needs: [build-test, docker, versioning]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying image..."
          echo "Pulling image..."
          echo "Running container..."
          echo "Health check passed"
          echo "DONE"


# ─────────────────────────────
# 5. SAVE DOCKER STATUS
# ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create status file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=sha-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


# ─────────────────────────────
# 6. AUTO README UPDATE (AI OPS)
# ─────────────────────────────
  update-readme:
    name: Update README (AI Ops)
    needs: [build-test, docker, versioning]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Summary
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          cat > report.md <<EOF
## 🚀 Release Summary

- Build: ${{ needs.build-test.outputs.test_result }}
- Docker: Pushed successfully
- Image: ${{ needs.docker.outputs.image_url }}
- Version: $VERSION
- Commit: $SHORT_SHA

🚀 System is healthy and production ready
EOF

      - name: Update README
        run: |
          echo "" >> README.md
          echo "---" >> README.md
          cat report.md >> README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add README.md
          git commit -m "docs: auto update release summary" || echo "no changes"
          git push
