name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write


jobs:

# ─────────────────────────────
# 1. BUILD & TEST
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. DOCKER + TRIVY
# ─────────────────────────────
  docker:
    name: Docker + Trivy
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. DEPLOY
# ─────────────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "IMAGE: v1.0.${{ github.run_number }}-${{ github.sha }}"
          echo "Deploying..."
          echo "Health check passed"


# ─────────────────────────────
# 4. GITHUB PAGES DEPLOY
# ─────────────────────────────
  deploy-pages:
    name: Deploy GitHub Pages Dashboard
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create docs folder
        run: mkdir -p docs

      - name: Generate Dashboard (Echo Based)
        run: |
          echo "<!DOCTYPE html>" > docs/index.html
          echo "<html>" >> docs/index.html
          echo "<head><title>DevSecOps Dashboard</title></head>" >> docs/index.html
          echo "<body>" >> docs/index.html

          echo "<h1>🚀 CI/CD Live Dashboard</h1>" >> docs/index.html

          echo "<p><b>Image:</b> v1.0.${{ github.run_number }}-${{ github.sha }}</p>" >> docs/index.html
          echo "<p><b>Version:</b> v1.0.${{ github.run_number }}</p>" >> docs/index.html
          echo "<p><b>Commit:</b> ${{ github.sha }}</p>" >> docs/index.html
          echo "<p><b>Time:</b> $(date -u)</p>" >> docs/index.html

          echo "<h2>Pipeline Status</h2>" >> docs/index.html
          echo "<ul>" >> docs/index.html
          echo "<li>Build → Success</li>" >> docs/index.html
          echo "<li>Docker → Success</li>" >> docs/index.html
          echo "<li>Trivy → Completed</li>" >> docs/index.html
          echo "</ul>" >> docs/index.html

          echo "</body>" >> docs/index.html
          echo "</html>" >> docs/index.html

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs


# ─────────────────────────────
# 5. VERSION TAGGING
# ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${GITHUB_RUN_NUMBER}
          git push origin v1.0.${GITHUB_RUN_NUMBER}


# ─────────────────────────────
# 6. SAVE STATUS
# ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=v1.0.${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


# ─────────────────────────────
# 7. README UPDATE (STABLE + SAFE)
# ─────────────────────────────
  update-readme:
    name: AI Release Notes
    needs: [build-test, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "## 🚀 Release Summary" > release.md
          echo "" >> release.md
          echo "- Build: ${{ needs.build-test.result }}" >> release.md
          echo "- Docker: Success" >> release.md
          echo "- Image: v1.0.${GITHUB_RUN_NUMBER}-${SHORT_SHA}" >> release.md
          echo "- Version: v1.0.${GITHUB_RUN_NUMBER}" >> release.md
          echo "- Commit: $SHORT_SHA" >> release.md
          echo "" >> release.md

          echo "## 🔐 Security" >> release.md
          echo "- Trivy Scan: CRITICAL/HIGH enforced" >> release.md
          echo "" >> release.md

          echo "## 📦 Flow" >> release.md
          echo "Build → Test → Docker → Scan → Tag → Deploy" >> release.md
          echo "" >> release.md

          echo "🚀 System is production ready" >> release.md

      - name: Replace CI Block in README
        run: |
          awk '
          /<!-- CI-REPORT-START -->/ {print; system("cat release.md"); skip=1; next}
          /<!-- CI-REPORT-END -->/ {skip=0}
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: update release notes" || exit 0
          git pull --rebase origin main || true
          git push origin HEAD:main
