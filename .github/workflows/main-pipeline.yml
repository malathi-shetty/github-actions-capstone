name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


# =========================================================
# PIPELINE FLOW (VISUAL)
# =========================================================
# build-test
#     ↓
# docker
#     ↓
# trivy-scan (JSON + SARIF)
#     ↓
# generate-reports
#     ↓
# security-gate
#     ↓
# deploy
# =========================================================


jobs:

# =========================================================
# 1. BUILD + TEST STAGE
# =========================================================
# PURPOSE:
# - Validates application code
# - Runs unit tests
# - Ensures only clean code proceeds further
#
# OUTPUT:
# - Verified build artifacts
#
# NEXT STEP:
# - Sends successful build to Docker stage
# =========================================================

  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD + PUSH STAGE
# =========================================================
# PURPOSE:
# - Builds Docker image from validated code
# - Pushes image to Docker registry
#
# INPUT:
# - Successful build-test job
#
# OUTPUT:
# - Docker image:
#   shettymalathi113/github-actions-capstone:v1.0.X
#
# NEXT STEP:
# - Sends image to security scanning (Trivy)
# =========================================================

  docker:
    name: Docker Build

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. SECURITY SCAN STAGE (TRIVY)
# =========================================================
# PURPOSE:
# - Scans Docker image for vulnerabilities (CVE detection)
# - Produces 2 outputs:
#     1. JSON → for automation + reports
#     2. SARIF → for GitHub Security UI
#
# INPUT:
# - Docker image from docker job
#
# OUTPUT:
# - trivy.json (machine-readable)
# - trivy-results.sarif (GitHub Security tab)
#
# NEXT STEP:
# - Sends results to report generation stage
# =========================================================

  trivy-scan:
    name: Run Trivy Scan

    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write


    steps:

      # -----------------------------
      # Install Trivy
      # -----------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Verify Trivy
        run: trivy --version


      # -----------------------------
      # JSON SCAN (Automation + Gate)
      # -----------------------------
      - name: Run Trivy JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}


      # -----------------------------
      # SARIF SCAN (GitHub Security UI)
      # -----------------------------
      - name: Run Trivy SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}


      # -----------------------------
      # Upload SARIF to GitHub Security Tab
      # -----------------------------
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


      # -----------------------------
      # Upload Artifacts for next stage
      # -----------------------------
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy.json
            trivy-results.sarif


# =========================================================
# 4. REPORT GENERATION STAGE
# =========================================================
# PURPOSE:
# - Converts raw scan data into readable reports
# - Generates markdown + AI summary
#
# INPUT:
# - trivy.json + trivy-results.sarif
#
# OUTPUT:
# - trivy.md (vulnerability table)
# - ai.md (summary notes)
#
# NEXT STEP:
# - Sends reports to security gate
# =========================================================

  generate-reports:
    name: Generate Reports

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: trivy-reports

      - name: Generate Markdown Report
        run: |
          echo "## 🔐 Trivy Vulnerability Report" > trivy.md
          echo "| Severity | Package | Vulnerability | Installed | Fixed |" >> trivy.md
          echo "|---|---|---|---|---|" >> trivy.md

          jq -r '
          .Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
          ' trivy.json >> trivy.md

      - name: Generate AI Notes
        run: |
          echo "## AI Notes" > ai.md
          echo "- Trivy scan completed" >> ai.md
          echo "- SARIF uploaded to GitHub Security tab" >> ai.md

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md
            trivy.json
            trivy-results.sarif


# =========================================================
# 5. SECURITY GATE (HARD BLOCK)
# =========================================================
# PURPOSE:
# - Enforces DevSecOps policy
# - Blocks deployment if HIGH/CRITICAL CVEs exist
#
# INPUT:
# - trivy.json
#
# OUTPUT:
# - PASS → deployment allowed
# - FAIL → pipeline stops
#
# NEXT STEP:
# - If PASS → deploy stage runs
# =========================================================

  security-gate:
    name: Security Gate

    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download Reports
        uses: actions/download-artifact@v4
        with:
          name: reports

      - name: Fail Build If Vulnerabilities Found
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "HIGH or CRITICAL vulnerabilities found"
            exit 1
          fi


# =========================================================
# 6. DEPLOYMENT STAGE
# =========================================================
# PURPOSE:
# - Deploys application ONLY if security gate passes
#
# INPUT:
# - Clean security scan (no HIGH/CRITICAL CVEs)
#
# OUTPUT:
# - Application deployed successfully
# =========================================================

  deploy:
    name: Deploy

    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"
