name: Main Pipeline

on:
  push:
    branches:
      - main
      - test-trivy-vulns

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# FLOW
# build-test → docker → trivy-scan → dashboard → security-gate → deploy
# =========================================================

jobs:

# =========================================================
# 1. BUILD & TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. TRIVY SCAN
# =========================================================
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    steps:

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq wget gnupg trivy

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

      # =====================================================
      # JSON SCAN (SOURCE OF TRUTH)
      # =====================================================
      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =====================================================
      # SARIF SCAN
      # =====================================================
      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif


# =========================================================
# 4. REPORT GENERATION (FULL RESTORED)
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      # =====================================================
      # FULL TABLE REPORT (FIXED)
      # =====================================================
      - name: Generate Trivy Markdown Report
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy.md
          echo "" >> trivy.md

          echo "| Severity | Package | Vulnerability | Installed Version | Fixed Version |" >> trivy.md
          echo "|----------|---------|---------------|-------------------|---------------|" >> trivy.md

          jq -r '
            .Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
          ' trivy.json >> trivy.md

      # =====================================================
      # AI NOTES
      # =====================================================
      - name: Generate AI Notes
        run: |
          echo "## 🤖 AI Notes" > ai.md
          echo "- Build completed" >> ai.md
          echo "- Docker image built" >> ai.md
          echo "- Trivy scan executed" >> ai.md

      # =====================================================
      # STEP SUMMARY (FIXED + TABLE INCLUDED)
      # =====================================================
      - name: Publish Summary
        run: |
          echo "## 🔐 Trivy Security Report Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat trivy.md >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md
            trivy.json


# =========================================================
# 5. SECURITY DASHBOARD (FIXED + CLEAN HTML)
# =========================================================
  security-dashboard:
    name: Security Dashboard
    needs: generate-reports
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Compute Metrics
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          SCORE=$((100 - (CRITICAL*25 + HIGH*10)))
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      # =====================================================
      # DASHBOARD SUMMARY (RESTORED ORIGINAL FORMAT)
      # =====================================================
      - name: Security Dashboard Summary
        run: |
          echo "## 🛡 Security Dashboard summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "📦 JSON Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🐳 Image Info" >> $GITHUB_STEP_SUMMARY
          echo "- Image: shettymalathi113/github-actions-capstone" >> $GITHUB_STEP_SUMMARY
          echo "- Build: v1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Top Vulnerable Packages" >> $GITHUB_STEP_SUMMARY
          jq -r '.Results[].Vulnerabilities[]? | .PkgName' trivy.json \
          | sort | uniq -c | sort -nr | head -10 \
          | while read c p; do
              echo "- $p → $c issues" >> $GITHUB_STEP_SUMMARY
            done

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ SECURITY STATUS: BLOCKED" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ SECURITY STATUS: CLEAN" >> $GITHUB_STEP_SUMMARY
          fi

      # =====================================================
      # FIXED HTML DASHBOARD (READABLE NOW)
      # =====================================================
      - name: Generate HTML Dashboard
        run: |
          cat <<EOF > security-dashboard.html
          <html>
          <head>
            <title>Trivy Security Dashboard</title>
            <style>
              body { font-family: Arial; margin: 20px; }
              pre { background: #f4f4f4; padding: 10px; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ddd; padding: 8px; }
            </style>
          </head>
          <body>

          <h1>🛡 Security Dashboard</h1>
          <h2>Score: $SCORE / 100</h2>

          <h3>Critical Vulnerabilities</h3>
          <pre>
$(jq '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy.json)
          </pre>

          <h3>High Vulnerabilities</h3>
          <pre>
$(jq '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")' trivy.json)
          </pre>

          </body>
          </html>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: security-dashboard.html


# =========================================================
# 6. SECURITY GATE
# =========================================================
  security-gate:
    name: Security Gate
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Fail Build If Vulnerabilities Found
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED: Security issues found"
            exit 1
          fi


# =========================================================
# 7. DEPLOY
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
