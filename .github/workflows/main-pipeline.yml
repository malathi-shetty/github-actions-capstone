name: Main Pipeline

on:
  push:
    branches:
      - main
      - test-trivy-vulns

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# PIPELINE FLOW
# build-test → docker → trivy-scan → security-dashboard → security-gate → deploy
# =========================================================

jobs:

# =========================================================
# 1. BUILD & TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. TRIVY SCAN (SECURITY ENGINE)
# =========================================================
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      # ---------------- CACHE ----------------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # ---------------- JSON SCAN ----------------
      - name: JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # ---------------- SARIF SCAN ----------------
      - name: SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # ---------------- ARTIFACTS ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # ---------------- SARIF UPLOAD ----------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ---------------- PR ANNOTATIONS ----------------
      - name: SARIF PR Annotations
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


# =========================================================
# 4. SECURITY DASHBOARD (PARALLEL OBSERVABILITY LAYER)
# =========================================================
  security-dashboard:
    name: Security Dashboard
    needs: trivy-scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      # ---------------- SECURITY SCORE ----------------
      - name: Security Score
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          SCORE=$((100 - (CRITICAL*25 + HIGH*10)))
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          echo "Security Score: $SCORE/100"
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      # ---------------- CVE GROUPING ----------------
      - name: CVE Grouping
        run: |
          echo "CRITICAL CVEs:"
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL") | .VulnerabilityID' trivy.json | sort -u

          echo "HIGH CVEs:"
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH") | .VulnerabilityID' trivy.json | sort -u

      # ---------------- DOCKER LAYER BREAKDOWN ----------------
      - name: Docker Layer Breakdown
        run: |
          jq -r '.Results[].Vulnerabilities[]? |
            .PkgName + " → " + (.PkgPath // "base-image")' trivy.json | head -20

      # ---------------- HTML DASHBOARD ----------------
      - name: Generate HTML Report
        run: |
          cat <<EOF > security-dashboard.html
          <html>
          <head><title>Security Dashboard</title></head>
          <body>
          <h1>Trivy Security Dashboard</h1>
          <h2>Security Score: $SCORE / 100</h2>

          <h3>Critical Vulnerabilities</h3>
          <pre>$(jq '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy.json)</pre>

          <h3>High Vulnerabilities</h3>
          <pre>$(jq '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")' trivy.json)</pre>
          </body>
          </html>
          EOF

      # ---------------- UPLOAD DASHBOARD ----------------
      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: security-dashboard.html


# =========================================================
# 5. SECURITY GATE (FAIL PIPELINE ONLY)
# =========================================================
  security-gate:
    name: Security Gate
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate Security Gate
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED: Security issues found"
            exit 1
          fi


# =========================================================
# 6. DEPLOY (ONLY IF CLEAN)
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
