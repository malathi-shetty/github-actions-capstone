name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


jobs:

# =========================================================
# STAGE 1: BUILD + TEST (VISIBLE FLOW)
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true

    steps:
      - name: Pipeline Trace - Build Start
        run: |
          echo "======================================"
          echo "BUILD-TEST STAGE STARTING"
          echo "Running unit tests + build"
          echo "======================================"

# =========================================================
# STAGE 2: DOCKER BUILD (VISIBLE FLOW)
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

    steps:
      - name: Docker Pipeline Trace
        run: |
          echo "======================================"
          echo "DOCKER STAGE STARTING"
          echo "Building Docker image"
          echo "Tag: v1.0.${{ github.run_number }}"
          echo "SHA: ${{ github.sha }}"
          echo "Pushing to registry: ENABLED"
          echo "======================================"

# =========================================================
# STAGE 3: TRIVY SCAN (DETAILED VISIBILITY)
# =========================================================
  trivy-scan:
    name: Run Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Install Trivy (TRACE)
        run: |
          echo "::group::Installing Security Tools"
          echo "Installing Trivy + jq"
          sudo apt-get update
          sudo apt-get install -y wget jq trivy
          echo "Trivy installed successfully"
          echo "::endgroup::"

      - name: Run JSON Vulnerability Scan
        run: |
          echo "::group::TRIVY JSON SCAN"
          echo "Scanning Docker image (HIGH + CRITICAL)"
          echo "Output → trivy.json"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "JSON scan completed"
          ls -lh trivy.json
          echo "::endgroup::"

      - name: Run SARIF Scan
        run: |
          echo "::group::TRIVY SARIF SCAN"
          echo "Generating SARIF for GitHub Security tab"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "SARIF scan completed"
          ls -lh trivy.sarif
          echo "::endgroup::"

      - name: Upload JSON Artifact
        run: echo "Uploading trivy.json artifact..."

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - name: Upload SARIF Artifact
        run: echo "Uploading trivy.sarif artifact..."

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# =========================================================
# STAGE 4: REPORT GENERATION (VISIBLE PROCESSING)
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download Artifact
        run: echo "Fetching trivy.json from artifacts"

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Generate Markdown + AI Report
        run: |
          echo "::group::REPORT GENERATION"

          echo "Building trivy.md report..."
          echo "Parsing JSON vulnerabilities via jq"

          echo "## Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "Generating AI summary..."
          echo "## AI Notes" > ai.md
          echo "- Scan completed successfully" >> ai.md
          echo "- Report generated from Trivy JSON output" >> ai.md

          echo "REPORTS CREATED:"
          ls -lh trivy.md ai.md

          echo "::endgroup::"

      - name: Upload Reports
        run: echo "Uploading reports artifact..."

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# STAGE 5: SECURITY GATE (REAL DECISION VISIBILITY)
# =========================================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download Scan Results
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate Security Policy
        run: |
          echo "::group::SECURITY GATE CHECK"

          echo "Counting vulnerabilities..."

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL FOUND: $CRITICAL"
          echo "HIGH FOUND: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ SECURITY GATE FAILED"
            echo "Blocking deployment due to vulnerabilities"
            exit 1
          fi

          echo "✅ SECURITY GATE PASSED"
          echo "::endgroup::"


# =========================================================
# STAGE 6: DEPLOYMENT (FINAL TRACEABLE STEP)
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deployment Start Trace
        run: |
          echo "======================================"
          echo "DEPLOYMENT STAGE STARTED"
          echo "Fetching approved image..."
          echo "Deploying to production..."
          echo "======================================"

      - name: Deploy App
        run: |
          echo "::group::DEPLOYMENT EXECUTION"
          echo "Deploying IMAGE: v1.0.${{ github.run_number }}"
          echo "Status: LIVE"
          echo "Application successfully deployed"
          echo "::endgroup::"
