name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:

# ─────────────────────────────
# 1. BUILD & TEST
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. DOCKER + TRIVY (BLOCK CRITICAL)
# ─────────────────────────────
  docker:
    name: Docker + Security Scan
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. VERSION TAG (SAFE FIX)
# ─────────────────────────────
  versioning:
    name: Git Tag
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${{ github.run_number }}
          git push origin v1.0.${{ github.run_number }}


# ─────────────────────────────
# 4. DEPLOY
# ─────────────────────────────
  deploy:
    name: Deploy
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          echo "Deploying image..."
          echo "Pulling image..."
          echo "Running container..."
          echo "Health check passed"


# ─────────────────────────────
# 5. SAVE STATUS
# ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=sha-${GITHUB_SHA::7}" >> docker-status.txt

      - uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


# ─────────────────────────────
# 6. README AI OPS UPDATE (CLEAN + NO BUGS)
# ─────────────────────────────
  update-readme:
    name: AI Release Notes
    needs: [build-test, docker, versioning]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Report
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "## 🚀 Release Summary" > release.md
          echo "" >> release.md
          echo "- Build: ${{ needs.build-test.result }}" >> release.md
          echo "- Docker: Success" >> release.md
          echo "- Image: ${{ needs.docker.outputs.image_url }}" >> release.md
          echo "- Version: v1.0.${{ github.run_number }}" >> release.md
          echo "- Commit: $SHORT_SHA" >> release.md
          echo "" >> release.md
          echo "## 🔐 Security" >> release.md
          echo "- Trivy Scan: CRITICAL/HIGH enforced" >> release.md
          echo "" >> release.md
          echo "## 📦 Flow" >> release.md
          echo "Build → Test → Docker → Scan → Tag → Deploy" >> release.md
          echo "" >> release.md
          echo "🚀 System is production ready" >> release.md

      - name: Replace README section
        run: |
          awk '
          /<!-- CI-REPORT-START -->/ {print; system("cat release.md"); skip=1; next}
          /<!-- CI-REPORT-END -->/ {skip=0}
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: auto update release notes" || echo "no changes"
          git push
