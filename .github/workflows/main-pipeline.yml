name: Main Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:

# ─────────────────────────────
# 1. BUILD & TEST
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. DOCKER BUILD + PUSH
# ─────────────────────────────
  docker:
    name: Docker Build + Push
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. 🔐 TRIVY SECURITY GATE (BLOCK CRITICAL)
# ─────────────────────────────
  security-scan:
    name: Trivy Security Gate
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}"
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif


# ─────────────────────────────
# 4. VERSION TAGGING
# ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: security-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${GITHUB_RUN_NUMBER}
          git push origin v1.0.${GITHUB_RUN_NUMBER}


# ─────────────────────────────
# 5. DEPLOY (SIMULATED)
# ─────────────────────────────
  deploy:
    name: Deploy
    needs: [build-test, docker, security-scan, versioning]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying image..."
          echo "Pulling image..."
          echo "Running container..."
          echo "Health check passed"
          echo "DONE"


# ─────────────────────────────
# 6. DOCKER STATUS ARTIFACT
# ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Create Status File
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=sha-${GITHUB_SHA::7}" >> docker-status.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


# ─────────────────────────────
# 7. 🧠 AI OPS README UPDATE (NO EOF VERSION)
# ─────────────────────────────
  update-readme:
    name: AI Ops Release Notes
    needs: [build-test, docker, security-scan, versioning]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "## 🚀 Release Summary" > release.md
          echo "" >> release.md
          echo "- Build: ${{ needs.build-test.result }}" >> release.md
          echo "- Docker: Pushed successfully" >> release.md
          echo "- Image: ${{ needs.docker.outputs.image_url }}" >> release.md
          echo "- Version: v1.0.${GITHUB_RUN_NUMBER}" >> release.md
          echo "- Commit: $SHORT_SHA" >> release.md
          echo "" >> release.md
          echo "## 🔐 Security" >> release.md
          echo "- Trivy Scan: CRITICAL/HIGH enforced" >> release.md
          echo "" >> release.md
          echo "## 📦 Pipeline Flow" >> release.md
          echo "Build → Test → Docker → Security Scan → Tag → Deploy" >> release.md
          echo "" >> release.md
          echo "🚀 System is production ready" >> release.md

      - name: Update README Section
        run: |
          awk '
          /<!-- CI-REPORT-START -->/ {print; system("cat release.md"); skip=1; next}
          /<!-- CI-REPORT-END -->/ {skip=0}
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit README Update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: AI release update" || echo "no changes"
          git push
