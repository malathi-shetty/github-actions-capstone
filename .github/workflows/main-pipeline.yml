name: Main Pipeline

on:
  push:
    branches:
      - main
      - test-trivy-vulns

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# FLOW
# build-test → docker → trivy-scan → dashboard → security-gate → deploy
# =========================================================

jobs:

# =========================================================
# 1. BUILD & TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. TRIVY SCAN
# =========================================================
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: trivy-db-${{ runner.os }}-

      - name: JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - name: SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: PR Annotations
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif


# =========================================================
# 4. SECURITY DASHBOARD (SAFE + PARALLEL)
# =========================================================
  security-dashboard:
    name: Security Dashboard
    needs: trivy-scan
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Compute Security Score
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          SCORE=$((100 - (CRITICAL*25 + HIGH*10)))
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          echo "SCORE=$SCORE" >> $GITHUB_ENV
          echo "Security Score: $SCORE"

      - name: CVE Grouping
        run: |
          echo "CRITICAL CVEs:"
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL") | .VulnerabilityID' trivy.json | sort -u

          echo "HIGH CVEs:"
          jq -r '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH") | .VulnerabilityID' trivy.json | sort -u

      - name: Docker Layer Breakdown
        run: |
          jq -r '.Results[].Vulnerabilities[]? |
            .PkgName + " → " + (.PkgPath // "base-image")' trivy.json | head -20

      - name: Generate HTML Dashboard (NO HEREDOC)
        run: |
          echo "<html>" > security-dashboard.html
          echo "<head><title>Security Dashboard</title></head>" >> security-dashboard.html
          echo "<body>" >> security-dashboard.html

          echo "<h1>Trivy Security Dashboard</h1>" >> security-dashboard.html
          echo "<h2>Security Score: $SCORE / 100</h2>" >> security-dashboard.html

          echo "<h3>CRITICAL Vulnerabilities</h3>" >> security-dashboard.html
          echo "<pre>" >> security-dashboard.html
          jq '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy.json >> security-dashboard.html
          echo "</pre>" >> security-dashboard.html

          echo "<h3>HIGH Vulnerabilities</h3>" >> security-dashboard.html
          echo "<pre>" >> security-dashboard.html
          jq '.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")' trivy.json >> security-dashboard.html
          echo "</pre>" >> security-dashboard.html

          echo "</body>" >> security-dashboard.html
          echo "</html>" >> security-dashboard.html

      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: security-dashboard.html


# =========================================================
# 5. SECURITY GATE (FAIL PIPELINE)
# =========================================================
  security-gate:
    name: Security Gate
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate Security
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED: Security issues found"
            exit 1
          fi


# =========================================================
# 6. DEPLOY
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
