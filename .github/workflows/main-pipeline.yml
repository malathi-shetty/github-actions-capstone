name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:

# =========================================
# BUILD + TEST
# =========================================

  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

# =========================================
# DOCKER BUILD + PUSH
# =========================================

  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

# =========================================
# TRIVY SCAN (JSON + SARIF)
# =========================================

  trivy-scan:
    name: Run Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget jq

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
        gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
        sudo tee /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Verify Trivy
      run: trivy --version

    # =========================
    # JSON REPORT (for pipeline)
    # =========================
    - name: Run Trivy JSON Scan
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format json \
          --output trivy.json \
          shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

    # =========================
    # SARIF REPORT (for Security Tab)
    # =========================
    - name: Run Trivy SARIF Scan
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format sarif \
          --output trivy-results.sarif \
          --exit-code 0 \
          shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

    - name: Upload SARIF to GitHub Security Tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: trivy-reports
        path: |
          trivy.json
          trivy-results.sarif

# =========================================
# GENERATE REPORTS
# =========================================

  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

    - name: Download Reports
      uses: actions/download-artifact@v4
      with:
        name: trivy-reports

    - name: Generate Markdown Report
      run: |
        echo "## 🔐 Trivy Vulnerability Report" > trivy.md
        echo "| Severity | Package | Vulnerability | Installed | Fixed |" >> trivy.md
        echo "|---|---|---|---|---|" >> trivy.md

        jq -r '
        .Results[]?.Vulnerabilities[]? |
        "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
        ' trivy.json >> trivy.md

    - name: Generate AI Notes
      run: |
        echo "## AI Notes" > ai.md
        echo "- Trivy scan completed" >> ai.md
        echo "- SARIF uploaded to Security tab" >> ai.md

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: |
          trivy.md
          ai.md
          trivy.json
          trivy-results.sarif

# =========================================
# SECURITY GATE
# =========================================

  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

    - name: Download Reports
      uses: actions/download-artifact@v4
      with:
        name: reports

    - name: Fail on HIGH/CRITICAL
      run: |
        CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
        HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

        echo "CRITICAL=$CRITICAL"
        echo "HIGH=$HIGH"

        if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
          echo "Security gate FAILED"
          exit 1
        fi

# =========================================
# DEPLOY
# =========================================

  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"
