name: Main Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# PIPELINE FLOW (DOCUMENTATION VIEW)
# =========================================================
# build-test → docker → trivy-scan → reports → security-gate → deploy
# =========================================================

jobs:

# =========================================================
# STAGE 1: BUILD + TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# STAGE 2: DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# STAGE 3: TRIVY SCAN (OPTIMIZED + SARIF + CACHE)
# =========================================================
  trivy-scan:
    name: Run Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      # -------------------------------------------------
      # Install Trivy
      # -------------------------------------------------
      - name: Install Trivy
        run: |
          echo "::group::Install Trivy"
          sudo apt-get update
          sudo apt-get install -y jq trivy
          echo "::endgroup::"

      # -------------------------------------------------
      # TRIVY DB CACHE (FAST SCANS)
      # -------------------------------------------------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # -------------------------------------------------
      # JSON SCAN
      # -------------------------------------------------
      - name: Run JSON Scan
        run: |
          echo "::group::Trivy JSON Scan"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "::endgroup::"

      # -------------------------------------------------
      # SARIF SCAN (RENAMED FILE)
      # -------------------------------------------------
      - name: Run SARIF Scan
        run: |
          echo "::group::Trivy SARIF Scan"

          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          echo "::endgroup::"

      # -------------------------------------------------
      # UPLOAD ARTIFACTS
      # -------------------------------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # -------------------------------------------------
      # SARIF → GITHUB SECURITY TAB
      # -------------------------------------------------
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # -------------------------------------------------
      # PR ANNOTATIONS (INLINE COMMENTS)
      # -------------------------------------------------
      - name: SARIF PR Annotations
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name == 'pull_request'
        with:
          sarif_file: trivy-results.sarif

      # -------------------------------------------------
      # SARIF SECURITY GATE (FAIL PIPELINE)
      # -------------------------------------------------
      - name: SARIF Security Gate
        run: |
          echo "::group::SARIF Security Gate"

          COUNT=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-results.sarif)

          echo "CRITICAL/HIGH (SARIF): $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ SARIF SECURITY GATE FAILED"
            exit 1
          fi

          echo "::endgroup::"


# =========================================================
# STAGE 4: REPORTS
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Build Reports
        run: |
          echo "## Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## AI Notes" > ai.md
          echo "- Scan completed successfully" >> ai.md

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# STAGE 5: SECURITY GATE (JSON BASED FINAL CHECK)
# =========================================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "BLOCKED"
            exit 1
          fi


# =========================================================
# STAGE 6: DEPLOY
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          echo "Deploying image v1.0.${{ github.run_number }}"
          echo "Application LIVE"
