name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


# =========================================================
# PIPELINE FLOW (VISUAL)
# =========================================================
# build-test
#   INPUT: source code
#   OUTPUT: build artifacts
#   ↓
# docker
#   INPUT: build artifacts
#   OUTPUT: docker image
#   ↓
# trivy-scan
#   INPUT: docker image
#   OUTPUT:
#       - trivy-json (automation + gate)
#       - trivy-sarif (GitHub Security UI)
#   ↓
# generate-reports
#   INPUT: trivy-json
#   OUTPUT:
#       - trivy.md
#       - ai.md
#   ↓
# security-gate
#   INPUT: trivy-json
#   OUTPUT: PASS / FAIL decision
#   ↓
# deploy
#   INPUT: approved image
# =========================================================


jobs:

# =========================================================
# 1. BUILD + TEST
# =========================================================
# INPUT: Source code
# OUTPUT: validated build
# NEXT: docker
# =========================================================

  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD
# =========================================================
# INPUT: build-test output
# OUTPUT: docker image
# NEXT: trivy-scan
# =========================================================

  docker:
    name: Docker Build

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. TRIVY SECURITY SCAN
# =========================================================
# INPUT: docker image
# OUTPUT:
#   - trivy-json  → automation + security gate
#   - trivy-sarif → GitHub Security tab
# NEXT: generate-reports
# =========================================================

  trivy-scan:
    name: Run Trivy Scan

    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run JSON Scan (Automation Artifact)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - name: Run SARIF Scan (GitHub Security UI)
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      - name: Upload JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# =========================================================
# 4. REPORT GENERATION
# =========================================================
# INPUT: trivy-json
# OUTPUT:
#   - trivy.md
#   - ai.md
# NEXT: security-gate
# =========================================================

  generate-reports:
    name: Generate Reports

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Generate Markdown Report
        run: |
          echo "## 🔐 Trivy Report" > trivy.md
          echo "| Severity | Package | Vulnerability | Installed | Fixed |" >> trivy.md
          echo "|---|---|---|---|---|" >> trivy.md

          jq -r '
          .Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
          ' trivy.json >> trivy.md

      - name: Generate AI Notes
        run: |
          echo "## AI Notes" > ai.md
          echo "- Trivy scan completed" >> ai.md
          echo "- SARIF uploaded to Security tab" >> ai.md

      - name: Upload Reports Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# 5. SECURITY GATE (HARD STOP)
# =========================================================
# INPUT: trivy-json
# OUTPUT:
#   PASS → deploy
#   FAIL → stop pipeline
# =========================================================

  security-gate:
    name: Security Gate

    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Block HIGH/CRITICAL CVEs
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "BLOCKED: vulnerabilities found"
            exit 1
          fi


# =========================================================
# 6. DEPLOY
# =========================================================
# INPUT: security-approved image
# OUTPUT: deployed app
# =========================================================

  deploy:
    name: Deploy

    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"
