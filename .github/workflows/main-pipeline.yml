name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:

# ─────────────────────────────
# 1. Build & Test
# ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


# ─────────────────────────────
# 2. Docker Build & Push
# ─────────────────────────────
  docker:
    name: Docker Build & Push
    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: latest
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# ─────────────────────────────
# 3. VERSION TAGGING
# ─────────────────────────────
  versioning:
    name: Create Git Tag
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          VERSION="v1.0.${GITHUB_RUN_NUMBER}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git tag $VERSION
          git push origin $VERSION


# ─────────────────────────────
# 4. DEPLOY
# ─────────────────────────────
  deploy:
    name: Deploy to Production
    needs: [build-test, docker]

    runs-on: ubuntu-latest

    environment:
      name: production

    env:
      IMAGE: ${{ needs.docker.outputs.image_url }}
      RESULT: ${{ needs.build-test.outputs.test_result }}

    steps:
      - name: Deploy
        run: |
          echo "Deploying image: $IMAGE"
          echo "Build: $RESULT"
          echo "Pull → Run → Health check → DONE"


# ─────────────────────────────
# 5. AUTO README UPDATE (FIXED)
# ─────────────────────────────
  update-readme:
    name: AI Ops - Update README
    needs: [build-test, docker, versioning]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate CI Report
        run: |
          echo "## ✨ Release Summary" > report.md
          echo "" >> report.md
          echo "- Build: ${{ needs.build-test.outputs.test_result }}" >> report.md
          echo "- Docker: Pushed successfully" >> report.md
          echo "- Image: ${{ needs.docker.outputs.image_url }}" >> report.md
          echo "- Version: v1.0.${{ github.run_number }}" >> report.md
          echo "- Commit: ${GITHUB_SHA::7}" >> report.md
          echo "" >> report.md
          echo "🚀 System is healthy and production ready" >> report.md

      - name: Append to README
        run: |
          echo "" >> README.md
          echo "---" >> README.md
          cat report.md >> README.md

      - name: Commit README update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "docs: auto update CI report" || echo "no changes"
          git push
