name: Main Pipeline

on:
  push:
    branches:
      - test-trivy-vulns

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write


jobs:

# =========================================
# 1. BUILD + TEST
# =========================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================
# 2. DOCKER BUILD
# =========================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================
# 3. TRIVY SCAN (SECURITY LAYER)
# =========================================
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    steps:

      - name: Install Trivy + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      # =========================
      # CACHE (FASTER SCANS)
      # =========================
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # =========================
      # JSON SCAN
      # =========================
      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =========================
      # SARIF SCAN
      # =========================
      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =========================
      # UPLOAD ARTIFACTS
      # =========================
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # =========================
      # SARIF → SECURITY TAB
      # =========================
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # =========================
      # PR ANNOTATIONS
      # =========================
      - name: SARIF PR Annotations
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # =========================
      # SARIF GATE (FAIL FAST)
      # =========================
      - name: SARIF Security Gate
        run: |
          COUNT=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-results.sarif)

          echo "SARIF Critical Issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ BLOCKED by SARIF Gate"
            exit 1
          fi


# =========================================
# 4. REPORT GENERATION
# =========================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Build Reports
        run: |
          echo "## 📦 Vulnerability Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## 🤖 AI Notes" > ai.md
          echo "- Automated security scan completed" >> ai.md

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================
# 5. SECURITY GATE (JSON)
# =========================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi


# =========================================
# 6. 🚀 ENTERPRISE SECURITY DASHBOARD (HTML + SCORE + LAYERS)
# =========================================
  security-dashboard:
    name: Security Dashboard (Enterprise)
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      # =========================
      # SECURITY METRICS
      # =========================
      - name: Compute Metrics
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)
          MEDIUM=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy.json)

          SCORE=$((100 - (CRITICAL*10 + HIGH*5 + MEDIUM*2)))
          if [ "$SCORE" -lt 0 ]; then SCORE=0; fi

          echo $CRITICAL > critical.txt
          echo $HIGH > high.txt
          echo $MEDIUM > medium.txt
          echo $SCORE > score.txt

      # =========================
      # DOCKER LAYER BREAKDOWN
      # =========================
      - name: Docker Layers
        run: |
          docker pull shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}
          docker history --no-trunc \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }} \
            > layers.txt

      # =========================
      # HTML REPORT GENERATION
      # =========================
      - name: Build HTML Dashboard
        run: |
          CRITICAL=$(cat critical.txt)
          HIGH=$(cat high.txt)
          MEDIUM=$(cat medium.txt)
          SCORE=$(cat score.txt)

          cat <<EOF > security-dashboard.html
          <html>
          <head>
            <title>Security Dashboard</title>
            <style>
              body { font-family: Arial; background:#0d1117; color:white; padding:20px; }
              .card { background:#161b22; padding:15px; margin:10px; border-radius:10px; }
              .score { font-size:40px; color:#58a6ff; }
            </style>
          </head>

          <body>

          <h1>🔐 Enterprise Security Dashboard</h1>

          <div class="card">
            <h2>Security Score</h2>
            <div class="score">$SCORE / 100</div>
          </div>

          <div class="card">
            <h2>CVE Summary</h2>
            <p>Critical: $CRITICAL</p>
            <p>High: $HIGH</p>
            <p>Medium: $MEDIUM</p>
          </div>

          <div class="card">
            <h2>🐳 Docker Layers</h2>
            <pre>
$(cat layers.txt | head -20)
            </pre>
          </div>

          <div class="card">
          EOF

          if [ "$CRITICAL" -gt 0 ]; then
            echo "<h2 style='color:red'>❌ BLOCKED</h2>" >> security-dashboard.html
          else
            echo "<h2 style='color:green'>✅ CLEAN</h2>" >> security-dashboard.html
          fi

          echo "</div></body></html>" >> security-dashboard.html

      # =========================
      # UPLOAD HTML REPORT
      # =========================
      - name: Upload HTML Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard-html
          path: security-dashboard.html


# =========================================
# 7. DEPLOY
# =========================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success 🚀"
