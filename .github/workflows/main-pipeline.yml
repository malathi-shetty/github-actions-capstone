name: Main Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  # Weekly security + Dependabot validation
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# FLOW
# validate-secrets
#        ↓
# build-test
#        ↓
# docker
#        ↓
# trivy-scan
#    ↙      ↘
# reports   dashboard
#      ↘    ↙
#    security-gate
#          ↓
#       deploy
# =========================================================

jobs:

  # =========================================================
  # 1. VALIDATE SECRETS
  # =========================================================
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Validate Docker Secrets
        if: github.actor != 'dependabot[bot]'      
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_TOKEN }}" ]; then
            echo "❌ Missing Docker secrets"
            exit 1
          fi

          echo "✅ Docker secrets available"


  # =========================================================
  # 2. BUILD & TEST
  # =========================================================
  build-test:
    name: Build & Test

    needs: validate-secrets

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


  # =========================================================
  # 3. DOCKER BUILD
  # =========================================================
  docker:
    name: Docker Build

    needs:
      - validate-secrets
      - build-test

    if: github.actor != 'dependabot[bot]'

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  # =========================================================
  # 4. TRIVY SCAN
  # =========================================================
  trivy-scan:
    name: Trivy Scan

    needs: docker

    if: needs.docker.result == 'success'

    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      # =====================================================
      # CHECKOUT (PINNED SHA)
      # =====================================================
      - name: Checkout code
        uses: actions/checkout@c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5

      # =====================================================
      # INSTALL TOOLS
      # =====================================================
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      # =====================================================
      # CACHE TRIVY DB (PINNED SHA)
      # =====================================================
      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae

        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}

          restore-keys: |
            trivy-db-${{ runner.os }}-

      # =====================================================
      # JSON SCAN
      # =====================================================
      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =====================================================
      # SARIF SCAN
      # =====================================================
      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =====================================================
      # UPLOAD JSON ARTIFACT (PINNED SHA)
      # =====================================================
      - name: Upload JSON Artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808

        with:
          name: trivy-json
          path: trivy.json

      # =====================================================
      # UPLOAD SARIF ARTIFACT (PINNED SHA)
      # =====================================================
      - name: Upload SARIF Artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808

        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # =====================================================
      # UPLOAD SARIF TO GITHUB SECURITY TAB
      # =====================================================
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

      # =====================================================
      # PR ANNOTATIONS
      # =====================================================
      - name: SARIF PR Annotations
        if: github.event_name == 'pull_request'

        uses: github/codeql-action/upload-sarif@v3

        with:
          sarif_file: trivy-results.sarif

      # =====================================================
      # SARIF SECURITY GATE
      # =====================================================
      - name: SARIF Security Gate
        run: |
          COUNT=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-results.sarif)

          echo "SARIF Issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ BLOCKED by SARIF Gate"
            exit 1
          fi


  # =========================================================
  # 5. GENERATE REPORTS
  # =========================================================
  generate-reports:
    name: Generate Reports

    needs: trivy-scan

    if: needs.trivy-scan.result == 'success'

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # DOWNLOAD ARTIFACT (PINNED SHA)
      # =====================================================
      - name: Download Trivy JSON
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16

        with:
          name: trivy-json

      # =====================================================
      # BUILD REPORTS
      # =====================================================
      - name: Build Reports
        run: |
          echo "## 📦 Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## 🤖 AI Summary" > ai.md
          echo "- Scan completed successfully" >> ai.md

      # =====================================================
      # UPLOAD REPORTS (PINNED SHA)
      # =====================================================
      - name: Upload Reports
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808

        with:
          name: reports

          path: |
            trivy.md
            ai.md


  # =========================================================
  # 6. SECURITY DASHBOARD
  # =========================================================
  security-dashboard:
    name: Security Dashboard

    needs: trivy-scan

    if: needs.trivy-scan.result == 'success'

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # DOWNLOAD JSON (PINNED SHA)
      # =====================================================
      - name: Download Trivy JSON
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16

        with:
          name: trivy-json

      # =====================================================
      # JSON SUMMARY
      # =====================================================
      - name: JSON Scan Summary
        run: |
          echo "## 📦 JSON Scan Summary" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "- Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY

      # =====================================================
      # TOP PACKAGES
      # =====================================================
      - name: Top Vulnerable Packages
        run: |
          echo "## 📦 Top Vulnerable Packages" >> $GITHUB_STEP_SUMMARY

          jq -r '.Results[].Vulnerabilities[]? | .PkgName' trivy.json \
          | sort | uniq -c | sort -nr | head -10 \
          | while read count pkg; do
              echo "- $pkg → $count issues" >> $GITHUB_STEP_SUMMARY
            done

      # =====================================================
      # IMAGE INFO
      # =====================================================
      - name: Image Info
        run: |
          echo "## 🐳 Image Info" >> $GITHUB_STEP_SUMMARY
          echo "- Image: shettymalathi113/github-actions-capstone" >> $GITHUB_STEP_SUMMARY
          echo "- Build: v1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # =====================================================
      # SHA COMPLIANCE REPORT
      # =====================================================
      - name: SHA Compliance Report
        run: |
          echo "## 🔐 SHA Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "| Action | SHA |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| actions/checkout | c2d88d3ecc89a9ef08eebf45d9637801dcee7eb5 |" >> $GITHUB_STEP_SUMMARY
          echo "| actions/cache | 27d5ce7f107fe9357f9df03efb73ab90386fccae |" >> $GITHUB_STEP_SUMMARY
          echo "| actions/upload-artifact | 65462800fd760344b1a7b4382951275a0abb4808 |" >> $GITHUB_STEP_SUMMARY
          echo "| actions/download-artifact | fa0a91b85d4f404e444e00e005971372dc801d16 |" >> $GITHUB_STEP_SUMMARY

      # =====================================================
      # SECURITY VERDICT
      # =====================================================
      - name: Security Verdict
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)

          if [ "$CRITICAL" -gt 0 ]; then
            echo "## 🚨 SECURITY STATUS: BLOCKED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ SECURITY STATUS: CLEAN" >> $GITHUB_STEP_SUMMARY
          fi


  # =========================================================
  # 7. SECURITY GATE
  # =========================================================
  security-gate:
    name: Security Gate

    needs:
      - trivy-scan
      - generate-reports
      - security-dashboard

    if: needs.trivy-scan.result == 'success'

    runs-on: ubuntu-latest

    steps:

      # =====================================================
      # DOWNLOAD JSON (PINNED SHA)
      # =====================================================
      - name: Download Trivy JSON
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16

        with:
          name: trivy-json

      # =====================================================
      # FINAL SECURITY GATE
      # =====================================================
      - name: Final Evaluation
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi

          echo "✅ SECURITY GATE PASSED"


  # =========================================================
  # 8. DEPLOY
  # =========================================================
  deploy:
    name: Deploy

    needs: security-gate

    if: |
      needs.security-gate.result == 'success' &&
      github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest

    steps:

      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
