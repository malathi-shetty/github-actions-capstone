name: Main Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write
  pull-requests: write

# =========================================================
# STAGES FLOW
# build-test → docker → trivy → reports → security-gate → dashboard → deploy
# =========================================================

jobs:

# =========================================================
# 1. BUILD & TEST
# =========================================================
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD
# =========================================================
  docker:
    name: Docker Build
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. TRIVY SCAN (SECURITY LAYER)
# =========================================================
  trivy-scan:
    name: Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:

      # ---------------------------
      # Install tools
      # ---------------------------
      - name: Install Trivy + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq trivy

      # ---------------------------
      # Cache Trivy DB (FAST SCANS)
      # ---------------------------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      # ---------------------------
      # JSON SCAN
      # ---------------------------
      - name: Run JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # ---------------------------
      # SARIF SCAN
      # ---------------------------
      - name: Run SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-results.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # ---------------------------
      # Upload artifacts
      # ---------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy-results.sarif

      # ---------------------------
      # SARIF → GitHub Security Tab
      # ---------------------------
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ---------------------------
      # PR ANNOTATIONS
      # ---------------------------
      - name: SARIF PR Annotations
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # ---------------------------
      # SARIF SECURITY GATE (FAIL FAST)
      # ---------------------------
      - name: SARIF Security Gate
        run: |
          COUNT=$(jq '[.runs[].results[]? | select(.level=="error")] | length' trivy-results.sarif)

          echo "SARIF Issues: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ BLOCKED by SARIF Gate"
            exit 1
          fi


# =========================================================
# 4. REPORT GENERATION
# =========================================================
  generate-reports:
    name: Generate Reports
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Build Reports
        run: |
          echo "## 📦 Trivy Report" > trivy.md

          jq -r '.Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"' \
          trivy.json >> trivy.md

          echo "## 🤖 AI Summary" > ai.md
          echo "- Automated scan completed successfully" >> ai.md

      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# 5. SECURITY GATE (FINAL JSON CHECK)
# =========================================================
  security-gate:
    name: Security Gate
    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Evaluate
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ BLOCKED"
            exit 1
          fi


# =========================================================
# 6. SECURITY DASHBOARD (ENTERPRISE REPORT)
# =========================================================
  security-dashboard:
    name: Security Dashboard
    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          name: trivy-json

      # =====================================================
      # 📦 A. JSON Scan Summary
      # =====================================================
      - name: JSON Scan Summary
        run: |
          echo "## 📦 JSON Scan Summary" >> $GITHUB_STEP_SUMMARY

          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "- Critical: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- High: $HIGH" >> $GITHUB_STEP_SUMMARY

      # =====================================================
      # 📦 B. Top Vulnerable Packages
      # =====================================================
      - name: Top Vulnerable Packages
        run: |
          echo "## 📦 Top Vulnerable Packages" >> $GITHUB_STEP_SUMMARY

          jq -r '.Results[].Vulnerabilities[]? | .PkgName' trivy.json \
          | sort | uniq -c | sort -nr | head -10 \
          | while read count pkg; do
              echo "- $pkg → $count issues" >> $GITHUB_STEP_SUMMARY
            done

      # =====================================================
      # 🐳 C. Image Info
      # =====================================================
      - name: Image Info Summary
        run: |
          echo "## 🐳 Image Info" >> $GITHUB_STEP_SUMMARY
          echo "- Image: shettymalathi113/github-actions-capstone" >> $GITHUB_STEP_SUMMARY
          echo "- Build: v1.0.${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # =====================================================
      # 🚨 D. Security Verdict
      # =====================================================
      - name: Security Verdict
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)

          if [ "$CRITICAL" -gt 0 ]; then
            echo "## 🚨 SECURITY STATUS: BLOCKED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ SECURITY STATUS: CLEAN" >> $GITHUB_STEP_SUMMARY
          fi


# =========================================================
# 7. DEPLOY (ONLY IF CLEAN)
# =========================================================
  deploy:
    name: Deploy
    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "🚀 Deploying v1.0.${{ github.run_number }}"
          echo "Application LIVE"
