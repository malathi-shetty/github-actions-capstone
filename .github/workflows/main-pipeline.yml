name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write
  security-events: write


# =========================================================
# PIPELINE FLOW (VISUAL)
# =========================================================
# build-test
#     ↓
# docker
#     ↓
# trivy-scan
#     ├── trivy-json        → automation + security gate
#     ├── trivy-sarif       → GitHub Security tab
#     ↓
# generate-reports
#     ├── trivy.md         → human report
#     ├── ai.md            → AI summary
#     ↓
# security-gate
#     ↓
# deploy
# =========================================================


jobs:

# =========================================================
# 1. BUILD + TEST
# =========================================================
# INPUT: Source code
# OUTPUT: Verified build
# NEXT: Docker build
# =========================================================

  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true


# =========================================================
# 2. DOCKER BUILD + PUSH
# =========================================================
# INPUT: Valid build
# OUTPUT: Docker image
# NEXT: Security scan (Trivy)
# =========================================================

  docker:
    name: Docker Build

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


# =========================================================
# 3. SECURITY SCAN (TRIVY)
# =========================================================
# INPUT: Docker image
# OUTPUT:
#   - trivy.json   (for automation & gate)
#   - trivy.sarif  (for GitHub Security UI)
# NEXT: Reporting stage
# =========================================================

  trivy-scan:
    name: Run Trivy Scan

    needs: docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      # -----------------------------
      # Install Trivy
      # -----------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget jq

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Verify Trivy
        run: trivy --version


      # -----------------------------
      # JSON SCAN (for automation + gate)
      # -----------------------------
      - name: Run Trivy JSON Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}


      # -----------------------------
      # SARIF SCAN (for GitHub Security tab)
      # -----------------------------
      - name: Run Trivy SARIF Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy.sarif \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

          ls -l trivy.sarif


      # -----------------------------
      # Upload SARIF → GitHub Security Tab
      # -----------------------------
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


      # -----------------------------
      # Upload structured artifacts (IMPORTANT)
      # -----------------------------
      - name: Upload Trivy JSON Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-json
          path: trivy.json

      - name: Upload Trivy SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif


# =========================================================
# 4. REPORT GENERATION
# =========================================================
# INPUT: trivy.json
# OUTPUT:
#   - trivy.md
#   - ai.md
# NEXT: Security gate
# =========================================================

  generate-reports:
    name: Generate Reports

    needs: trivy-scan
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Generate Markdown Report
        run: |
          echo "## 🔐 Trivy Vulnerability Report" > trivy.md
          echo "| Severity | Package | Vulnerability | Installed | Fixed |" >> trivy.md
          echo "|---|---|---|---|---|" >> trivy.md

          jq -r '
          .Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
          ' trivy.json >> trivy.md

      - name: Generate AI Notes
        run: |
          echo "## AI Notes" > ai.md
          echo "- Trivy scan completed" >> ai.md
          echo "- JSON + SARIF generated separately" >> ai.md

      - name: Upload Reports Artifact
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            trivy.md
            ai.md


# =========================================================
# 5. SECURITY GATE
# =========================================================
# INPUT: trivy.json
# OUTPUT:
#   PASS → deploy
#   FAIL → stop pipeline
# =========================================================

  security-gate:
    name: Security Gate

    needs: generate-reports
    runs-on: ubuntu-latest

    steps:

      - name: Download JSON Artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-json

      - name: Fail if HIGH/CRITICAL found
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)
          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "HIGH or CRITICAL vulnerabilities found"
            exit 1
          fi


# =========================================================
# 6. DEPLOYMENT
# =========================================================
# INPUT: Passed security gate
# OUTPUT: App deployed
# =========================================================

  deploy:
    name: Deploy

    needs: security-gate
    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"
