name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-test:
    name: Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true

  docker:
    name: Docker Build

    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy:
    name: Deploy

    needs: docker

    runs-on: ubuntu-latest

    steps:
      - name: Deploy App
        run: |
          echo "Deploying IMAGE"
          echo "Success"

  ai-trivy:
    name: AI + Trivy Report

    needs: docker

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # INSTALL TRIVY
      # =========================

      - name: Install Trivy
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            wget \
            apt-transport-https \
            gnupg \
            lsb-release

          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | \
          sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update

          sudo apt-get install -y trivy

      # =========================
      # RUN TRIVY SCAN
      # =========================

      - name: Run Trivy Scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format json \
            --output trivy.json \
            shettymalathi113/github-actions-capstone:v1.0.${{ github.run_number }}

      # =========================
      # FAIL BUILD IF HIGH/CRITICAL
      # =========================

      - name: Fail Build If Vulnerabilities Found
        run: |
          CRITICAL=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy.json)

          HIGH=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy.json)

          echo "CRITICAL: $CRITICAL"
          echo "HIGH: $HIGH"

          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "HIGH or CRITICAL vulnerabilities found"
            exit 1
          fi

      # =========================
      # GENERATE TRIVY MARKDOWN
      # =========================

      - name: Generate Trivy Markdown
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy.md
          echo "" >> trivy.md

          echo "| Severity | Package | Vulnerability | Installed Version | Fixed Version |" >> trivy.md
          echo "|---|---|---|---|---|" >> trivy.md

          jq -r '
          .Results[]?.Vulnerabilities[]? |
          "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.InstalledVersion) | \(.FixedVersion // "N/A") |"
          ' trivy.json >> trivy.md

      # =========================
      # GENERATE AI NOTES
      # =========================

      - name: Generate AI Notes
        run: |
          echo "## 🤖 AI Release Notes" > ai.md
          echo "" >> ai.md
          echo "- Build completed successfully" >> ai.md
          echo "- Docker image built and pushed" >> ai.md
          echo "- Trivy scan completed" >> ai.md
          echo "- README auto updated" >> ai.md

      # =========================
      # UPDATE README
      # =========================

      - name: Update README
        run: |
          python3 << 'EOF'
          from pathlib import Path
          import re

          readme = Path("README.md").read_text()

          trivy = Path("trivy.md").read_text()

          ai = Path("ai.md").read_text()

          readme = re.sub(
              r'<!-- TRIVY-TABLE-START -->.*?<!-- TRIVY-TABLE-END -->',
              f'<!-- TRIVY-TABLE-START -->\n{trivy}\n<!-- TRIVY-TABLE-END -->',
              readme,
              flags=re.S
          )

          readme = re.sub(
              r'<!-- AI-START -->.*?<!-- AI-END -->',
              f'<!-- AI-START -->\n{ai}\n<!-- AI-END -->',
              readme,
              flags=re.S
          )

          Path("README.md").write_text(readme)
          EOF

      # =========================
      # COMMIT README
      # =========================

      - name: Commit README
        run: |
          git config user.name "github-actions"

          git config user.email "github-actions@github.com"

          git add README.md

          # Stop if no changes
          git diff --cached --quiet && exit 0

          # Prevent recursive workflow runs
          git commit -m "[skip ci] update trivy report"

          git push
