name: Main Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  # ─────────────────────────────
  # Job 1 — Build & Test
  # ─────────────────────────────
  build-test:
    name: Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true


  # ─────────────────────────────
  # Job 2 — Docker Build & Push
  # ─────────────────────────────
  docker:
    name: Docker Build & Push
    needs: build-test

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: latest
      sha_tag: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  # ─────────────────────────────
  # Job 3 — Docker Status Artifact
  # ─────────────────────────────
  docker-status:
    name: Save Docker Status
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - name: Write Docker status
        run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=${{ needs.docker.outputs.image_url }}" >> docker-status.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt


  # ─────────────────────────────
  # Job 4 — Deploy
  # ─────────────────────────────
  deploy:
    name: Deploy to Production
    needs:
      - build-test
      - docker

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Deploy application
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }} to production"

      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Environment | production |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.docker.outputs.image_url }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build & Test | ✅ ${{ needs.build-test.outputs.test_result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`$(echo "${{ github.sha }}" | cut -c1-7)\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ✅ Deploy simulated |" >> "$GITHUB_STEP_SUMMARY"
