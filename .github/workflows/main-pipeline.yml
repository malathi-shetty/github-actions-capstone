name: Main Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  workflows: write   # ✅ FIX: required for tag + workflow updates

jobs:

  # ─────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  # ─────────────────────────────
  # 2. DOCKER (TRIVY INSIDE REUSABLE)
  # ─────────────────────────────
  docker:
    needs: build-test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "shettymalathi113/github-actions-capstone"
      tag: v1.0.${{ github.run_number }}-${{ github.sha }}
      sha_tag: sha-${{ github.sha }}
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  # ─────────────────────────────
  # 3. DEPLOY
  # ─────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploying image v1.0.${{ github.run_number }}-${{ github.sha }}"
          echo "Success"

  # ─────────────────────────────
  # 4. GITHUB PAGES
  # ─────────────────────────────
  deploy-pages:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create docs
        run: mkdir -p docs

      - name: Generate Dashboard
        run: |
          echo "<html><body>" > docs/index.html
          echo "<h1>CI/CD Dashboard</h1>" >> docs/index.html
          echo "<p>Image: v1.0.${{ github.run_number }}</p>" >> docs/index.html
          echo "<p>Commit: ${{ github.sha }}</p>" >> docs/index.html
          echo "</body></html>" >> docs/index.html

      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs

  # ─────────────────────────────
  # 5. VERSION TAGGING (FIXED)
  # ─────────────────────────────
  versioning:
    needs: deploy
    runs-on: ubuntu-latest

    permissions:
      contents: write
      workflows: write   # ✅ FIX HERE TOO

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v1.0.${{ github.run_number }}
          git push origin v1.0.${{ github.run_number }}

  # ─────────────────────────────
  # 6. SAVE STATUS
  # ─────────────────────────────
  docker-status:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "STATUS=SUCCESS" > docker-status.txt
          echo "IMAGE=v1.0.${{ github.run_number }}" >> docker-status.txt

      - uses: actions/upload-artifact@v4
        with:
          name: docker-status
          path: docker-status.txt

  # ─────────────────────────────
  # 7. AI RELEASE NOTES (NO TRIVY HERE)
  # ─────────────────────────────
  ai-release:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate AI Notes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {"role":"system","content":"You are a DevSecOps assistant"},
                {"role":"user","content":"Generate release notes for CI/CD build ${{ github.run_number }}"}
              ]
            }')

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > ai.md

      - name: Update README
        run: |
          awk '
          /<!-- AI-START -->/ {print; system("cat ai.md"); skip=1; next}
          /<!-- AI-END -->/ {skip=0}
          !skip
          ' README.md > tmp && mv tmp README.md

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update AI notes" || exit 0
          git push origin HEAD:main
