name: Reusable Docker Build and Push

on:
  workflow_call:

    inputs:
      image_name:
        description: Docker image name
        required: true
        type: string

      tag:
        description: Primary Docker image tag
        required: true
        type: string

      sha_tag:
        description: Optional SHA tag
        required: false
        type: string
        default: ""

      push:
        description: Push image to Docker Hub
        required: false
        type: boolean
        default: true

    secrets:
      docker_username:
        required: true

      docker_token:
        required: true

    outputs:
      image_url:
        description: Full image URL
        value: ${{ jobs.docker.outputs.image_url }}

jobs:

  docker:

    name: Docker Build & Push

    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}

    steps:

      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      # Build dynamic tag list
      - name: Build tag list
        id: tags
        run: |
          TAGS="${{ inputs.image_name }}:${{ inputs.tag }}"

          if [ -n "${{ inputs.sha_tag }}" ]; then
            TAGS="${TAGS},${{ inputs.image_name }}:${{ inputs.sha_tag }}"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

          echo "Tags: ${TAGS}"

      # Build and push Docker image
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Set workflow output
      - name: Set image output
        id: meta
        run: |
          IMAGE_URL="${{ inputs.image_name }}:${{ inputs.tag }}"

          echo "image_url=${IMAGE_URL}" >> "$GITHUB_OUTPUT"

          echo "Primary image: ${IMAGE_URL}"

      # Trivy vulnerability scan
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: '${{ inputs.image_name }}:${{ inputs.tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'
        continue-on-error: true

      # Upload scan report
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_number }}
          path: trivy-results.sarif
          retention-days: 14
        continue-on-error: true

      # Workflow summary
      - name: Docker summary
        run: |
          echo "## Docker Build Summary" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"

          echo "| Image | \`${{ steps.meta.outputs.image_url }}\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| All tags | \`${{ steps.tags.outputs.tags }}\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Push enabled | \`${{ inputs.push }}\` |" >> "$GITHUB_STEP_SUMMARY"

          echo "| Commit | \`$(echo "${{ github.sha }}" | cut -c1-7)\` |" >> "$GITHUB_STEP_SUMMARY"
