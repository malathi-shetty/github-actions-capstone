name: Reusable Docker Build and Push

on:
  workflow_call:

    inputs:
      image_name:
        required: true
        type: string
      tag:
        required: true
        type: string
      sha_tag:
        required: false
        type: string
        default: ""
      push:
        required: false
        type: boolean
        default: true

    secrets:
      docker_username:
        required: true
      docker_token:
        required: true

    outputs:
      image_url:
        description: "Docker image"
        value: ${{ jobs.docker.outputs.image_url }}

      image_digest:
        description: "Docker digest"
        value: ${{ jobs.docker.outputs.image_digest }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}
      image_digest: ${{ steps.digest.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build & Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ inputs.image_name }}:${{ inputs.tag }}

      - name: Set Image Output
        id: meta
        run: |
          echo "image_url=${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Get Digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ inputs.image_name }}:${{ inputs.tag }} || echo "unknown")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.tag }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif
