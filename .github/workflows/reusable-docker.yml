name: Reusable Docker Build and Push

on:
  workflow_call:

    inputs:
      image_name:
        required: true
        type: string

      tag:
        required: true
        type: string

      sha_tag:
        required: false
        type: string
        default: ""

      push:
        required: false
        type: boolean
        default: true

    secrets:
      docker_username:
        required: true
      docker_token:
        required: true

    outputs:
      image_url:
        description: "Docker image full URL"
        value: ${{ jobs.docker.outputs.image_url }}

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.meta.outputs.image_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build tags
        id: tags
        run: |
          TAGS="${{ inputs.image_name }}:${{ inputs.tag }}"

          if [ -n "${{ inputs.sha_tag }}" ]; then
            TAGS="${TAGS},${{ inputs.image_name }}:${{ inputs.sha_tag }}"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build & Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}

      - name: Set Image Output
        id: meta
        run: |
          IMAGE="${{ inputs.image_name }}:${{ inputs.tag }}"
          echo "image_url=$IMAGE" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────
      # 1. SARIF SCAN (BLOCK PIPELINE)
      # ─────────────────────────────
      - name: Trivy Scan (CRITICAL BLOCK)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.tag }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Upload SARIF Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif

      # ─────────────────────────────
      # 2. JSON REPORT (FOR README TABLE)
      # ─────────────────────────────
      - name: Trivy JSON Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}:${{ inputs.tag }}
          format: json
          output: trivy.json
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Generate Vulnerability Table File
        run: |
          echo "## 🔐 Vulnerability Report (Trivy)" > trivy-report.md
          echo "| Severity | Package | Vulnerability | Status |" >> trivy-report.md
          echo "|----------|---------|---------------|--------|" >> trivy-report.md

          if [ -f trivy.json ]; then
            jq -r '.Results[]?.Vulnerabilities[]? |
            "| \(.Severity) | \(.PkgName) | \(.VulnerabilityID) | \(.Status) |"' trivy.json >> trivy-report.md
          else
            echo "| No data | - | - | - |" >> trivy-report.md
          fi
